  <rect x="200" y="100" width="400" height="300" fill="#8b5cf6" opacity="0.2" rx="20"/>
  <rect x="700" y="200" width="300" height="400" fill="#06b6d4" opacity="0.15" rx="20"/>
  
  <!-- Text placeholder -->
  <text x="50" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">Profile Background</text>
  <text x="50" y="150" font-family="Arial, sans-serif" font-size="20" fill="#cbd5e1">Replace with your actual image</text>
